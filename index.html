<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>BillVyapar</title>

    <!-- Preconnect to API — eliminates DNS/TLS cold-start on first fetch -->
    <link rel="preconnect" href="https://billvyapar-backend.fly.dev" crossorigin />
    <link rel="dns-prefetch" href="https://billvyapar-backend.fly.dev" />
    <!-- Keep old URL as fallback during transition -->
    <link rel="preconnect" href="https://accounts-8rx9.onrender.com" crossorigin />

    <!-- Let Vite auto-generate correct preload chunks during build -->

    <!-- Inline theme detection — runs before React to prevent white flash on dark mode -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          var bg = t === 'light' ? '#ffffff' : '#0f172a';
          document.documentElement.style.background = bg;
          document.body && (document.body.style.background = bg);
        } catch(e) {}
      })();
    </script>
  </head>

  <body>
    <!-- Inline critical splash — matches dark theme to avoid white flash -->
    <div id="root">
      <div id="app-splash" style="
        position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        background:#070712;
        z-index:9999;
        font-family:system-ui,-apple-system,sans-serif;
      ">
        <div style="position:relative;margin-bottom:24px;">
           <div style="position:absolute;inset:-15px;background:radial-gradient(circle,#6366f1 0%,transparent 70%);filter:blur(30px);opacity:.4;animation:bv-pulse 1.5s ease-in-out infinite alternate;"></div>
           <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="position:relative;z-index:1;">
             <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
           </svg>
        </div>
        <div style="text-align:center;position:relative;z-index:2;">
           <div style="font-size:32px;font-weight:900;letter-spacing:-0.05em;color:white;opacity:0;animation:fadeUp 0.8s ease-out forwards;">
              BILLVYAPAR<span style="color:#10b981;">.</span>
           </div>
           <div class="splash-subtitle" style="font-size:12px;font-weight:700;color:rgba(165,180,252,0.4);letter-spacing:0.3em;text-transform:uppercase;margin-top:10px;opacity:0;animation:fadeUp 0.8s ease-out 0.3s forwards;">
              STRATEGIZING BUSINESS
           </div>
        </div>
      </div>
    </div>
    <style>
      @keyframes bv-pulse { from { opacity:.2; transform:scale(.95); } to { opacity:1; transform:scale(1.05); } }
      @keyframes fadeUp { from { opacity:0; transform:translateY(20px); filter:blur(10px); } to { opacity:1; transform:translateY(0); filter:blur(0); } }
      #app-splash { transition: opacity .25s ease-out; }
    </style>
    <script type="module" src="src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Unregister any old SW first, then register fresh
          navigator.serviceWorker.getRegistrations().then(regs => {
            const unregAll = regs.map(r => r.unregister());
            Promise.all(unregAll).then(() => {
              navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
          }).catch(() => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
          });
        });
      }
      // Remove splash — try MutationObserver first, hard timeout as fallback
      (function() {
        function removeSplash() {
          var splash = document.getElementById('app-splash');
          if (!splash) return;
          splash.style.opacity = '0';
          setTimeout(function() { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 150);
        }
        // Hard timeout — remove splash after 3s no matter what
        setTimeout(removeSplash, 3000);
        // Also watch for React mounting
        document.addEventListener('DOMContentLoaded', function() {
          var root = document.getElementById('root');
          if (!root) return;
          var mo = new MutationObserver(function() {
            removeSplash();
            mo.disconnect();
          });
          mo.observe(root, { childList: true, subtree: true });
        });
      })();
    </script>
  </body>
</html>
